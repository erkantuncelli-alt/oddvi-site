<html lang="en">
<head>

<meta name="twitter:description" content="Free Oddvi phone wallpapers. Stay odd, one lock screen at a time." />
<meta name="twitter:image" content="https://theoddvi.com/uploads/og-share.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#141414;
    --paper:#fff8f0;
    --paper-2:#f7eddd;
    --card:#ffffff;
    --red:#ff3366;
    --red-deep:#e21b54;
    --teal:#1ec8c8;
    --yellow:#ffc93c;
    --yellow-deep:#f5b400;
    --grape:#845ec2;
    --tang:#ff7a45;
    --mint:#e7fbf0;
    --line: color-mix(in srgb, var(--ink) 14%, transparent);
    --font-disp:"Bricolage Grotesque", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}

  header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:3px solid var(--ink)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:var(--font-disp);font-weight:800;font-size:23px;text-decoration:none;letter-spacing:-.01em;display:inline-flex;align-items:center;gap:8px;transform:rotate(-3deg)}
  .logo-icon{flex:0 0 auto;display:block}
  .nav-links{display:flex;align-items:center;gap:20px;font-weight:600;font-size:15px}
  .nav-links a.txt{text-decoration:none;opacity:.75;transition:opacity .2s,transform .2s}
  .nav-links a.txt:hover{opacity:1;transform:rotate(-2deg)}
  .nav-cta{background:var(--red);color:#fff;padding:9px 16px;border-radius:12px;font-weight:700;font-size:14px;border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s;text-decoration:none}
  .nav-cta:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .nav-toggle{display:none;background:var(--ink);color:#fff;border:2.5px solid var(--ink);border-radius:10px;width:44px;height:40px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:3px 3px 0 var(--ink)}
  @media(max-width:1180px){
    .nav-toggle{display:inline-flex}
    .nav-links{position:absolute;top:72px;left:0;right:0;background:var(--paper);border-bottom:3px solid var(--ink);flex-direction:column;align-items:flex-start;gap:18px;padding:22px 24px;display:none}
    .nav-links.open{display:flex}
    .nav-links a.txt{font-size:19px;opacity:1}
    .nav-cta{align-self:flex-start}
  }

  .lang-switch{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lang-btn{font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.04em;line-height:1;border:2px solid var(--ink);cursor:pointer;border-radius:999px;padding:6px 10px;color:#fff;opacity:.5;transition:opacity .15s,transform .15s,box-shadow .15s}
  .lang-btn:hover{opacity:.9;transform:translateY(-1px)}
  .lang-btn:focus-visible{outline:none;opacity:1}
  .lang-btn[aria-pressed="true"]{opacity:1;transform:translateY(-1px) rotate(-2deg);box-shadow:3px 3px 0 var(--ink)}
  .lang-btn[data-lang="en"]{background:#ff3366}
  .lang-btn[data-lang="tr"]{background:#1ec8c8}
  .lang-btn[data-lang="de"]{background:#f5b400;color:#141414}
  .lang-btn[data-lang="fr"]{background:#845ec2}
  .lang-btn[data-lang="hu"]{background:#ff7a45}

  .hero{padding:64px 0 30px}
  .kicker{display:inline-block;font-family:var(--font-disp);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:5px 12px;border-radius:8px;transform:rotate(-2deg)}
  .jtitle{font-family:var(--font-disp);font-weight:800;font-size:clamp(40px,7.4vw,72px);line-height:1;letter-spacing:-.03em;margin:16px 0 14px}
  .jtitle .pop{display:inline-block;background:var(--teal);color:var(--ink);padding:0 .08em;border:3px solid var(--ink);border-radius:10px;transform:rotate(-2deg);box-shadow:5px 5px 0 var(--ink)}
  .jsub{font-size:clamp(16px,2.2vw,20px);opacity:.78;max-width:560px;font-weight:500}

  .vol-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 6px}
  .vol-tab{font-family:var(--font-disp);font-weight:800;font-size:14px;border:2.5px solid var(--ink);border-radius:10px;padding:7px 14px;background:var(--card);cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
  .vol-tab[aria-pressed="true"]{background:var(--yellow)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:22px;padding:26px 0 90px}
  .wp-card{background:var(--card);border:3px solid var(--ink);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;box-shadow:6px 6px 0 var(--ink);transition:transform .2s,box-shadow .2s;position:relative}
  .wp-card:nth-child(odd){transform:rotate(-1deg)}
  .wp-card:nth-child(even){transform:rotate(1deg)}
  .wp-card:hover{transform:rotate(0) translateY(-4px);box-shadow:9px 9px 0 var(--ink)}
  .wp-card .num{position:absolute;top:8px;left:8px;z-index:2;font-family:var(--font-disp);font-weight:800;font-size:12px;background:var(--ink);color:#fff;padding:3px 8px;border-radius:6px}
  .wp-card .draft{position:absolute;top:8px;right:8px;z-index:2;font-family:var(--font-disp);font-weight:800;font-size:10px;letter-spacing:.04em;background:var(--yellow);color:var(--ink);padding:3px 7px;border-radius:6px;border:2px solid var(--ink)}
  .wp-card .cov{aspect-ratio:9/16;background:var(--paper-2);overflow:hidden;border-bottom:3px solid var(--ink)}
  .wp-card .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .wp-card .body{padding:12px 14px 16px}
  .wp-card h3{font-family:var(--font-disp);font-weight:800;font-size:15px;line-height:1.2;letter-spacing:-.01em}

  .empty{padding:40px 0 120px;font-size:18px;opacity:.7;font-weight:500}

  /* detail view */
  .detail{max-width:520px;margin:0 auto;padding:40px 0 100px}
  .backlink{display:inline-block;font-weight:700;font-size:14px;color:var(--ink);text-decoration:none;margin-bottom:26px;background:var(--yellow);border:2.5px solid var(--ink);border-radius:10px;padding:8px 14px;box-shadow:3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s}
  .backlink:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .detail .cov{border-radius:var(--radius);overflow:hidden;background:var(--paper-2);border:3px solid var(--ink);box-shadow:8px 8px 0 var(--red);margin-bottom:22px;aspect-ratio:9/16}
  .detail .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .detail h1{font-family:var(--font-disp);font-weight:800;font-size:clamp(26px,5vw,38px);line-height:1.04;letter-spacing:-.02em;margin:0 0 6px}
  .detail .meta{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--red-deep);margin-bottom:20px}
  .detail .draft-note{background:var(--yellow);border:2.5px solid var(--ink);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;margin-bottom:20px;box-shadow:4px 4px 0 var(--ink)}
  .dl-btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-family:var(--font-disp);font-weight:800;font-size:16px;padding:14px 22px;border-radius:14px;text-decoration:none;border:2.5px solid var(--ink);box-shadow:5px 5px 0 var(--red);transition:transform .12s,box-shadow .12s}
  .dl-btn:hover{transform:translate(2px,2px);box-shadow:3px 3px 0 var(--red)}

  footer{border-top:3px solid var(--ink);padding:40px 0;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:14px;font-weight:500}
</style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a href="/index.html" class="logo">
        <img class="logo-icon" src="/uploads/oddvi-logo-icon.png" width="26" height="35" alt="" aria-hidden="true" />
        ODDVI
      </a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">&#9776;</button>
      <nav class="nav-links">
        <a href="/story.html#meet" class="txt" data-i18n="nav.meet">Meet Oddvi</a>
        <a href="/story.html#story" class="txt" data-i18n="nav.story">The Story</a>
        <a href="/motion.html" class="txt" data-i18n="mot.kicker">Oddvi in motion</a>
        <a href="/blog.html" class="txt" data-i18n="nav.journal">Journal</a>
        <a href="/odd-gallery.html" class="txt" data-i18n="nav.gallery">Gallery</a>
        <a href="/wallpapers.html" class="txt" data-i18n="nav.wallpapers">Wallpapers</a>
        <div id="langSwitch" class="lang-switch" role="group" aria-label="Language"></div>
        <a href="/odd-test.html" class="nav-cta" data-i18n="nav.test">What's your Odd?</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- LIST VIEW -->
    <section id="listView">
      <div class="hero">
        <span class="kicker" id="jkicker">Wallpaper Club</span>
        <h1 class="jtitle" id="jtitle">Free <span class="pop">Wallpapers</span></h1>
        <p class="jsub" id="jsub">Stay odd, one lock screen at a time.</p>
      </div>
      <div class="vol-tabs" id="volTabs"></div>
      <div class="grid" id="grid"></div>
      <p class="empty" id="empty" hidden></p>
    </section>

    <!-- DETAIL VIEW -->
    <article class="detail" id="detailView" hidden>
      <a href="#" class="backlink" id="backlink">← Back to Wallpapers</a>

      <h1 id="dTitle"></h1>

        <span id="dDownloadLabel">Download PNG</span>
      </a>
    </article>
  </main>

  <footer class="wrap">
    <span>© Pardon My Odd</span>
    <span>Follow the blob: <a href="https://instagram.com/theoddvi" style="color:var(--red-deep)">@theoddvi</a> <span style="opacity:.55;font-size:13px">· 🏗️ <a href="https://instagram.com/pardonmyodd" style="color:inherit" title="Our upcoming brand — coming soon">@pardonmyodd</a></span></span>
  </footer>

  <script src="/blob-buddy.js"></script>
  <script src="/normal-odd-mode.js"></script>
  <script src="/jelly.js"></script>
  <script src="/i18n.js"></script>
  <script>
    (function(){
      var t=document.querySelector('.nav-toggle'), nl=document.querySelector('.nav-links');
      if(!t||!nl) return;
      t.addEventListener('click',function(){var o=nl.classList.toggle('open');t.setAttribute('aria-expanded',o?'true':'false');});
      nl.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){nl.classList.remove('open');t.setAttribute('aria-expanded','false');});});
    })();
  </script>
  <script>
  (function(){
    var T = {
      en:{kicker:"Wallpaper Club",title:'Free <span class="pop">Wallpapers</span>',sub:"Stay odd, one lock screen at a time.",back:"\u2190 Back to Wallpapers",empty:"No wallpapers yet. Come back soon.",dl:"Download PNG",draft:"Draft preview \u2014 low-res placeholder. Final high-res file coming soon."},
      tr:{kicker:"Wallpaper Club",title:'Ücretsiz <span class="pop">Duvar Kağıtları</span>',sub:"Her kilit ekranında biraz Odd kal.",back:"\u2190 Duvar Kağıtlarına dön",empty:"Henüz duvar kağıdı yok. Yakında burada.",dl:"PNG İndir",draft:"Taslak önizleme — düşük çözünürlüklü yer tutucu. Yüksek çözünürlüklü hali yakında."},
      de:{kicker:"Wallpaper Club",title:'Kostenlose <span class="pop">Wallpaper</span>',sub:"Bleib odd, ein Sperrbildschirm nach dem anderen.",back:"\u2190 Zurück zu Wallpapers",empty:"Noch keine Wallpaper. Bald mehr.",dl:"PNG herunterladen",draft:"Entwurfsvorschau \u2014 niedrige Auflösung, Platzhalter. Finale Version folgt bald."},
      fr:{kicker:"Wallpaper Club",title:'Fonds D\u2019écran <span class="pop">Gratuits</span>',sub:"Reste odd, un écran verrouillé à la fois.",back:"\u2190 Retour aux fonds d\u2019écran",empty:"Pas encore de fonds d\u2019écran. Bientôt.",dl:"Télécharger le PNG",draft:"Aperçu provisoire \u2014 espace réservé basse résolution. La version finale arrive bientôt."},
      hu:{kicker:"Wallpaper Club",title:'Ingyenes <span class="pop">Háttérképek</span>',sub:"Maradj odd minden zárolt képernyőn.",back:"\u2190 Vissza a háttérképekhez",empty:"Még nincs háttérkép. Hamarosan.",dl:"PNG letöltése",draft:"Vázlat előnézet \u2014 alacsony felbontású helykitöltő. A végleges hamarosan érkezik."}
    };
    var data = {volumes:[], items:[]};

    function lang(){
      var l = document.documentElement.lang || localStorage.getItem("oddvi_lang") || "en";
      return T[l] ? l : "en";
    }
    function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
    function titleOf(item,l){ return item[l] || item.en || ""; }

    var activeVol = null;

    function renderVolTabs(l){
      var vols = data.volumes.slice().sort(function(a,b){return a.order-b.order;});
      if(!activeVol && vols.length) activeVol = vols[0].id;
      document.getElementById("volTabs").innerHTML = vols.map(function(v){
        return '<button class="vol-tab" data-vol="'+esc(v.id)+'" aria-pressed="'+(v.id===activeVol?'true':'false')+'">'+esc(v[l]||v.en)+'</button>';
      }).join("");
      document.querySelectorAll('.vol-tab').forEach(function(b){
        b.addEventListener('click', function(){ activeVol = b.getAttribute('data-vol'); route(); });
      });
    }

    function renderList(){
      var l = lang(), t = T[l];
      document.getElementById("jkicker").textContent = t.kicker;
      document.getElementById("jtitle").innerHTML = t.title;
      document.getElementById("jsub").textContent = t.sub;
      document.getElementById("backlink").textContent = t.back;

      renderVolTabs(l);

      var items = data.items.filter(function(it){ return it.volume === activeVol; })
        .slice().sort(function(a,b){ return a.order-b.order; });

      var grid = document.getElementById("grid"), empty = document.getElementById("empty");
      if(!items.length){
        grid.innerHTML = ""; empty.textContent = t.empty; empty.hidden = false; return;
      }
      empty.hidden = true;
      grid.innerHTML = items.map(function(it){
        return '<a class="wp-card" href="#'+encodeURIComponent(it.id)+'">'+
          '<span class="num">'+esc(it.id)+'</span>'+
          (it.draft ? '<span class="draft">DRAFT</span>' : '') +
          '<div class="cov"><img src="'+esc(it.file)+'" alt="'+esc(titleOf(it,l))+'" loading="lazy"></div>'+
          '<div class="body"><h3>'+esc(titleOf(it,l))+'</h3></div></a>';
      }).join("");
    }

    function renderDetail(it){
      var l = lang(), t = T[l];
      document.getElementById("backlink").textContent = t.back;
      document.getElementById("dCov").innerHTML = '<img src="'+esc(it.file)+'" alt="'+esc(titleOf(it,l))+'">';
      document.getElementById("dTitle").textContent = titleOf(it,l);
      var vol = data.volumes.filter(function(v){return v.id===it.volume;})[0];
      document.getElementById("dMeta").textContent = "#"+it.id + (vol ? " \u00b7 " + (vol[l]||vol.en) : "") + (it.resolution ? " \u00b7 " + it.resolution : "");
      var dn = document.getElementById("dDraftNote");
      if(it.draft){ dn.hidden = false; dn.textContent = t.draft; } else { dn.hidden = true; }
      var a = document.getElementById("dDownload");
      a.href = it.file;
      var niceName = "Oddvi-Wallpaper-" + (vol?vol.en.replace(/[^a-z0-9]+/ig,''):'') + "-" + it.id + "-" + titleOf(it,'en').replace(/[^a-z0-9]+/ig,'-').replace(/^-+|-+$/g,'') + ".png";
      a.setAttribute('download', niceName);
      document.getElementById("dDownloadLabel").textContent = t.dl;
      a.onclick = function(){
        try {
          var body = JSON.stringify({ name: 'download:wallpaper:' + (vol?vol.id:'?') + ':' + it.id });
          if (navigator.sendBeacon) { navigator.sendBeacon('/api/stat', new Blob([body], {type:'application/json'})); }
          else { fetch('/api/stat', {method:'POST', headers:{'Content-Type':'application/json'}, body: body, keepalive:true}); }
        } catch(e){}
      };
    }

    function route(){
      var hash = decodeURIComponent((location.hash||"").replace(/^#/,"")).trim();
      var listView = document.getElementById("listView");
      var detailView = document.getElementById("detailView");
      var found = null;
      if(hash){
        for(var i=0;i<data.items.length;i++){ if(data.items[i].id===hash){ found = data.items[i]; break; } }
      }
      if(found){
        activeVol = found.volume;
        listView.hidden = true; detailView.hidden = false;
        renderDetail(found); window.scrollTo(0,0);
      } else {
        detailView.hidden = true; listView.hidden = false;
        renderList();
      }
    }

    function load(){
      fetch("/wallpapers.json?t="+Date.now())
        .then(function(r){ return r.ok ? r.json() : {volumes:[],items:[]}; })
        .then(function(d){ data = {volumes:(d&&d.volumes)||[], items:(d&&d.items)||[]}; route(); })
        .catch(function(){ data = {volumes:[],items:[]}; route(); });
    }

    window.addEventListener("hashchange", route);
    window.addEventListener("oddvi:lang", function(){ route(); });
    document.getElementById("backlink").addEventListener("click", function(e){
      e.preventDefault(); location.hash = "";
    });

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", load);
    } else { load(); }
  })();
  </script>
</body>
</html>
