<style>
  :root{
    --ink:#141414;--paper:#fbf6f3;--paper-2:#f2e9e3;--card:#fff;
    --red:#ff3366;--red-deep:#e21b54;--yellow:#f5b400;--yellow-deep:#d8a000;
    --line:color-mix(in srgb,var(--ink) 12%,transparent);
    --font-disp:"Bricolage Grotesque",system-ui,sans-serif;
    --font-body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);color:var(--ink);background:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  img{display:block;max-width:100%}
  a{color:inherit}
  .wrap{width:100%;max-width:760px;margin-inline:auto;padding:24px}

  header{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav{max-width:1100px;margin-inline:auto;display:flex;align-items:center;justify-content:space-between;height:64px;padding-inline:24px;gap:12px}
  .logo{font-family:var(--font-disp);font-weight:800;font-size:21px;text-decoration:none;letter-spacing:.02em}
  .nav-right{display:flex;align-items:center;gap:14px}
  .lang-switch{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lang-btn{font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.04em;line-height:1;border:none;cursor:pointer;border-radius:999px;padding:7px 11px;color:#fff;opacity:.45;transition:opacity .15s,transform .15s,box-shadow .15s}
  .lang-btn:hover{opacity:.85;transform:translateY(-1px)}
  .lang-btn:focus-visible{outline:none;opacity:1}
  .lang-btn[aria-pressed="true"]{opacity:1;transform:translateY(-1px);box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink)}
  .lang-btn[data-lang="en"]{background:#ff3366}
  .lang-btn[data-lang="tr"]{background:#1ec8c8}
  .lang-btn[data-lang="de"]{background:#f5b400;color:#141414}
  .lang-btn[data-lang="fr"]{background:#845ec2}
  .lang-btn[data-lang="hu"]{background:#ff7a45}
  .nav a.back{font-weight:500;font-size:14px;opacity:.7;text-decoration:none;white-space:nowrap}
  .nav a.back:hover{opacity:1}
  @media(max-width:520px){.nav a.back{display:none}}

  .btn{font-family:var(--font-body);font-weight:600;font-size:16px;padding:15px 28px;border-radius:999px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:9px;transition:transform .2s,background .2s,box-shadow .2s}
  .btn-primary{background:var(--red);color:#fff;box-shadow:0 14px 28px -12px var(--red)}
  .btn-primary:hover{transform:translateY(-3px);background:var(--red-deep)}
  .btn-ghost{background:transparent;border:2px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink);transform:translateY(-3px)}
  .btn-yellow{background:var(--yellow);color:var(--ink)}
  .btn-yellow:hover{transform:translateY(-3px);background:var(--yellow-deep)}

  .screen{display:none}
  .screen.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .intro{text-align:center;padding-top:40px}
  .eyebrow{display:inline-flex;gap:8px;align-items:center;background:var(--red);color:#fff;font-weight:600;font-size:13px;letter-spacing:.07em;text-transform:uppercase;padding:6px 14px;border-radius:999px}
  .intro h1{font-family:var(--font-disp);font-weight:800;font-size:clamp(46px,11vw,86px);line-height:.92;letter-spacing:-.03em;margin:20px 0 16px}
  .intro p{font-size:19px;opacity:.8;max-width:48ch;margin:0 auto 30px}
  .odds-preview{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:34px 0 30px}
  @media(max-width:600px){.odds-preview{grid-template-columns:repeat(3,1fr)}}
  .odds-preview figure{border-radius:14px;overflow:hidden;background:var(--paper-2);aspect-ratio:1/1;position:relative}
  .odds-preview img{width:100%;height:100%;object-fit:cover}
  .odds-preview figcaption{position:absolute;left:0;right:0;bottom:0;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:14px 4px 4px;text-align:center;text-transform:uppercase;letter-spacing:.03em}

  .progress{height:8px;background:var(--paper-2);border-radius:999px;overflow:hidden;margin:8px 0 6px}
  .progress span{display:block;height:100%;background:var(--red);border-radius:999px;transition:width .3s ease}
  .qcount{font-size:13px;font-weight:600;opacity:.5;letter-spacing:.04em}
  .question{font-family:var(--font-disp);font-weight:800;font-size:clamp(28px,6vw,44px);line-height:1.05;letter-spacing:-.02em;margin:22px 0 26px}
  .options{display:grid;gap:12px}
  .opt{display:flex;align-items:center;gap:14px;text-align:left;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:18px 20px;font-size:17px;font-weight:500;cursor:pointer;transition:border-color .15s,transform .15s;font-family:inherit;color:inherit;width:100%}
  .opt:hover{border-color:var(--ink);transform:translateX(4px)}
  .opt .dot{width:22px;height:22px;border:2px solid currentColor;border-radius:50%;flex:none;opacity:.4;transition:.15s}
  .opt:hover .dot{opacity:1;background:var(--red);border-color:var(--red)}
  .qnav{display:flex;justify-content:space-between;margin-top:22px}
  .qnav button{background:none;border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;opacity:.6;padding:8px}
  .qnav button:hover{opacity:1}
  .qnav button:disabled{opacity:.2;cursor:default}

  .result{text-align:center;padding-top:24px}
  .result .label{font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;opacity:.5}
  .result h2{font-family:var(--font-disp);font-weight:800;font-size:clamp(48px,12vw,92px);line-height:.92;letter-spacing:-.03em;color:var(--red-deep);margin:10px 0 6px}
  .result .hero-img{width:260px;max-width:70%;margin:18px auto;border-radius:24px;overflow:hidden;box-shadow:0 24px 50px -26px rgba(20,20,20,.5)}
  .result .hero-img img{width:100%;aspect-ratio:1031/1280;object-fit:cover}
  .result .blurb{font-size:18px;opacity:.85;max-width:46ch;margin:0 auto 8px}
  .result .traits{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:18px 0 8px}
  .result .traits span{background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:14px;font-weight:500}

  .downloads{margin:40px 0 10px}
  .downloads h3{font-family:var(--font-disp);font-weight:800;font-size:26px;margin-bottom:6px}
  .downloads .hint{opacity:.6;font-size:15px;margin-bottom:22px}
  .dl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:600px){.dl-grid{grid-template-columns:1fr;max-width:300px;margin-inline:auto}}
  .dl{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:12px}
  .dl .thumb{border-radius:12px;overflow:hidden;background:var(--paper-2);display:grid;place-items:center;min-height:120px}
  .dl .thumb img{width:100%;height:auto}
  .dl .thumb span{font-size:13px;opacity:.6;padding:20px;text-align:center}
  .dl .name{font-weight:600;font-size:15px}
  .dl .btn{justify-content:center;padding:12px 16px;font-size:15px}
  .result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:36px}

  footer{text-align:center;padding:40px 24px;border-top:1px solid var(--line);margin-top:50px;font-size:14px;opacity:.6}
  :focus-visible{outline:3px solid var(--red);outline-offset:3px;border-radius:8px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a href="/index.html" class="logo">ODDVI</a>
    <div class="nav-right">
      <div id="langSwitch" class="lang-switch" role="group" aria-label="Language"></div>
      <a href="/index.html" class="back" id="homeLink">← Back home</a>
    </div>
  </div>
</header>

<main class="wrap">
  <!-- INTRO -->
  <section class="screen active intro" id="intro">
    <span class="eyebrow" id="introEyebrow">The Oddvi Test</span>
    <h1>What's your Odd?</h1>
    <p id="introText">Ten quick questions…</p>
    <div class="odds-preview" id="oddsPreview"></div>
    <button class="btn btn-primary" id="startBtn">Start the test →</button>
    <p class="odd-stat-line" id="testStatLine" style="margin-top:16px;font-size:13px;opacity:.65;font-weight:600"></p>
  </section>

  <!-- QUIZ -->
  <section class="screen" id="quiz">
    <div class="qcount" id="qcount"></div>
    <div class="progress"><span id="bar" style="width:0%"></span></div>
    <h2 class="question" id="question"></h2>
    <div class="options" id="options"></div>
    <div class="qnav"><button id="backBtn" disabled>← Back</button><span></span></div>
  </section>

  <!-- RESULT -->
  <section class="screen result" id="result">
    <div class="label" id="youAre">You are…</div>
    <h2 id="rName">—</h2>
    <div class="hero-img"><img id="rImg" alt="Your Odd"></div>
    <p class="blurb" id="rBlurb"></p>
    <div class="traits" id="rTraits"></div>
    <div class="downloads">
      <h3 id="dlTitle">Take your Odd with you</h3>
      <div class="hint" id="dlHint"></div>
      <div class="dl-grid" id="dlGrid"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-ghost" id="restartBtn">↺ Retake</button>
      <a class="btn btn-yellow" id="updatesLink" href="/index.html#join">Get updates →</a>
    </div>
  </section>
</main>

<footer>Pardon My Odd · @theoddvi · Stay Odd.</footer>

<script src="/i18n.js"></script>
<script>
/* image pools per archetype — one is picked at random each time a result is shown */
const IMG_POOL={
  explorer:["uploads/oddgallery/wrong-turn-right-direction.jpg","uploads/oddgallery/mountain-oddvi-summit.jpg","uploads/oddgallery/sail-different.jpg","uploads/oddgallery/surf-oddly.jpg","uploads/oddgallery/ski-oddly.jpg","uploads/oddgallery/oddvi-goes-to-italy-v2.jpg"],
  creative:["uploads/oddgallery/oops-made-art-again.jpg","uploads/oddgallery/the-book-of-oddities.jpg","uploads/oddgallery/i-call-it-abstract.jpg","uploads/oddgallery/third-eye-spray-paint.jpg","uploads/oddgallery/spray-paint-swagger.jpg"],
  nightowl:["uploads/oddgallery/midnight-snacker.jpg","uploads/oddgallery/night-owl-artist.jpg","uploads/oddgallery/midnight-heist.jpg","uploads/oddgallery/ugly-but-odd.jpg","uploads/oddgallery/existential-crisis-loading.jpg"],
  zen:["uploads/oddgallery/zen-amid-chaos.jpg","uploads/oddgallery/alerts-off-peace-on.jpg","uploads/oddgallery/sip-happens.jpg","uploads/oddgallery/comfortably-weird.jpg","uploads/oddgallery/permanent-vacation-vibes.jpg"],
  rebel:["uploads/oddgallery/why-blend-in.jpg","uploads/oddgallery/found-normal-returned-it.jpg","uploads/oddgallery/you-missed-a-spot.jpg","uploads/oddgallery/premium-style-bargain-quality.jpg","uploads/oddgallery/no-refund-odd.jpg"],
  dreamer:["uploads/oddgallery/head-in-the-clouds.jpg","uploads/oddgallery/dragon-walk.jpg","uploads/oddgallery/garden-wave-hello.jpg","uploads/oddgallery/proud-rock-collection.jpg"]
};
/* picked once per archetype per test session, so downloads (wallpaper/profile/card) all match the result screen */
const IMG={};
function pickImg(key){
  if(!IMG[key]){
    const pool=IMG_POOL[key]||[];
    IMG[key]=pool.length?pool[Math.floor(Math.random()*pool.length)]:"";
  }
  return IMG[key];
}
const PRIORITY=["explorer","creative","nightowl","zen","rebel","dreamer"];

const $=s=>document.querySelector(s);
let LANG=(window.I18N&&window.I18N.pick())||"en";
let screen="intro";
let state={i:0,picks:[]};
function QZ(){const q=window.I18N&&window.I18N.quiz;return (q&&(q[LANG]||q.en))||{ui:{},q:[],r:{}};}

/* re-render when language changes */
window.addEventListener('oddvi:lang', e=>{
  LANG=e.detail.lang;
  renderStatic();
  if(screen==="intro") renderPreview();
  else if(screen==="quiz") renderQ();
  else if(screen==="result" && lastKey) showResult(lastKey);
});

function renderStatic(){
  const u=QZ().ui;
  $("#introEyebrow").textContent=u.eyebrow||"";
  $("#introText").textContent=u.intro||"";
  $("#startBtn").textContent=u.start||"Start";
  $("#homeLink").textContent=u.home||"← Home";
  $("#backBtn").textContent=u.back||"← Back";
  $("#youAre").textContent=u.youAre||"";
  $("#dlTitle").textContent=u.dlTitle||"";
  $("#dlHint").textContent=u.dlHint||"";
  $("#restartBtn").textContent=u.retake||"↺";
  $("#updatesLink").textContent=u.updates||"→";
  renderStatLine();
}
let testStatCount=null;
function renderStatLine(){
  const el=$("#testStatLine"); if(!el) return;
  if(testStatCount==null){ el.textContent=""; return; }
  const tmpl=QZ().ui.statLine||"{n} people have taken this test so far";
  el.textContent=tmpl.replace("{n}", testStatCount.toLocaleString());
}
fetch('/api/stats?names=test_completed')
  .then(r=>r.ok?r.json():{})
  .then(d=>{ testStatCount = d.test_completed || 0; renderStatLine(); })
  .catch(()=>{});
function renderPreview(){
  const r=QZ().r;
  $("#oddsPreview").innerHTML=PRIORITY.map(k=>{
    const name=(r[k]&&r[k].n)||k;
    return `<figure><img src="${pickImg(k)}" alt="${name}" loading="lazy"><figcaption>${name.replace(/ Odd$/,'')}</figcaption></figure>`;
  }).join("");
}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$("#"+id).classList.add("active");screen=id;window.scrollTo({top:0,behavior:"smooth"});}

$("#startBtn").onclick=()=>{state={i:0,picks:[]};show("quiz");renderQ();};
$("#restartBtn").onclick=()=>{state={i:0,picks:[]};lastKey=null;Object.keys(IMG).forEach(k=>delete IMG[k]);show("intro");renderPreview();};
$("#backBtn").onclick=()=>{if(state.i>0){state.i--;state.picks.pop();renderQ();}};

function renderQ(){
  const Z=QZ(), n=Z.q.length, Q=Z.q[state.i]; if(!Q)return;
  const tmpl=Z.ui.qcount||"Question {n} of {total}";
  $("#qcount").textContent=tmpl.replace("{n}",state.i+1).replace("{total}",n);
  $("#bar").style.width=(state.i/n*100)+"%";
  $("#question").textContent=Q.t;
  const box=$("#options");box.innerHTML="";
  Q.o.forEach(([text,key])=>{
    const b=document.createElement("button");
    b.className="opt";b.innerHTML='<span class="dot"></span><span></span>';
    b.querySelector('span:last-child').textContent=text;
    b.onclick=()=>pick(key);box.appendChild(b);
  });
  $("#backBtn").disabled=state.i===0;
}
function pick(key){
  state.picks[state.i]=key;
  const n=QZ().q.length;
  if(state.i<n-1){state.i++;renderQ();}
  else finish();
}
function finish(){
  const t={};PRIORITY.forEach(k=>t[k]=0);
  state.picks.forEach(k=>{if(t[k]!=null)t[k]++;});
  let best=PRIORITY[0];PRIORITY.forEach(k=>{if(t[k]>t[best])best=k;});
  fetch('/api/stat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name:'test_completed'})})
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d && typeof d.count==='number'){ testStatCount=d.count; } })
    .catch(()=>{});
  showResult(best);
}

let lastKey=null;
async function showResult(key){
  lastKey=key;
  const R=QZ().r[key]||{}, u=QZ().ui;
  $("#rName").textContent=R.n||"";
  $("#rImg").src=pickImg(key);$("#rImg").alt=R.n||"";
  $("#rBlurb").textContent=R.bl||"";
  $("#rTraits").innerHTML=(R.tr||[]).map(t=>`<span>${t}</span>`).join("");
  $("#bar").style.width="100%";
  show("result");

  const grid=$("#dlGrid");
  grid.innerHTML=`<div class="dl"><div class="thumb"><span>${u.building||"…"}</span></div></div>`.repeat(3);

  let img; try{await document.fonts.ready;}catch(e){}
  try{img=await loadImg(pickImg(key));}catch(e){img=null;}

  const formats=[
    {label:u.dlWallpaper,file:`oddvi-${key}-wallpaper.png`,draw:c=>wallpaper(c,img,R)},
    {label:u.dlProfile,  file:`oddvi-${key}-profile.png`,  draw:c=>profile(c,img,R)},
    {label:u.dlCard,     file:`oddvi-${key}-card.png`,      draw:c=>card(c,img,R,key)},
  ];
  grid.innerHTML="";
  for(const f of formats){
    const cv=document.createElement("canvas");f.draw(cv);
    let url="";try{url=cv.toDataURL("image/png");}catch(e){url="";}
    const el=document.createElement("div");el.className="dl";
    el.innerHTML=`<div class="thumb">${url?`<img src="${url}" alt="${f.label}">`:`<span>${u.blocked||""}</span>`}</div><div class="name">${f.label||""}</div>`;
    const actions=document.createElement("div");actions.style.cssText="display:flex;gap:8px;justify-content:center;flex-wrap:wrap";
    const btn=document.createElement("a");btn.className="btn btn-yellow";btn.textContent=u.download||"Download";
    if(url){btn.href=url;btn.download=f.file;}else{btn.href="#";btn.onclick=e=>e.preventDefault();}
    actions.appendChild(btn);
    if(url && navigator.canShare){
      cv.toBlob(blob=>{
        if(!blob) return;
        const file=new File([blob], f.file, {type:"image/png"});
        if(navigator.canShare({files:[file]})){
          const shareBtn=document.createElement("button");shareBtn.type="button";shareBtn.className="btn btn-ghost";
          shareBtn.textContent=u.share||"Share";
          shareBtn.onclick=()=>navigator.share({files:[file],title:"Oddvi"}).catch(()=>{});
          actions.appendChild(shareBtn);
        }
      }, "image/png");
    }
    el.appendChild(actions);grid.appendChild(el);
  }
}

function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
function drawCover(ctx,img,x,y,w,h){
  if(!img){ctx.fillStyle="#2a2a2a";ctx.fillRect(x,y,w,h);return;}
  const ir=img.width/img.height,r=w/h;let sw,sh,sx,sy;
  if(ir>r){sh=img.height;sw=sh*r;sx=(img.width-sw)/2;sy=0;}else{sw=img.width;sh=sw/r;sx=0;sy=(img.height-sh)/2;}
  ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
}
function rr(ctx,x,y,w,h,rad){ctx.beginPath();ctx.roundRect(x,y,w,h,rad);}
function wlines(ctx,text,maxW){const ws=(text||"").split(" ");let o=[],l="";for(const w of ws){const t=l?l+" "+w:w;if(ctx.measureText(t).width>maxW&&l){o.push(l);l=w;}else l=t;}if(l)o.push(l);return o;}
const DISP=w=>w+" 'Bricolage Grotesque', system-ui, sans-serif";
const BODY=w=>w+" 'Inter', system-ui, sans-serif";
const RED="#ff3366", INK="#141414";

function wallpaper(cv,img,R){
  cv.width=1080;cv.height=1920;const c=cv.getContext("2d");
  c.fillStyle=INK;c.fillRect(0,0,1080,1920);drawCover(c,img,0,0,1080,1920);
  const g=c.createLinearGradient(0,820,0,1920);g.addColorStop(0,"rgba(10,10,10,0)");g.addColorStop(.55,"rgba(10,10,10,.55)");g.addColorStop(1,"rgba(10,10,10,.93)");
  c.fillStyle=g;c.fillRect(0,820,1080,1100);
  c.textAlign="left";c.fillStyle="#fff";c.font=DISP("800 46px");c.fillText("ODDVI",70,110);
  c.fillStyle=RED;c.font=BODY("700 30px");c.fillText("WHAT'S YOUR ODD?",70,1500);
  c.fillStyle="#fff";c.font=DISP("800 116px");
  let y=1500+128;wlines(c,(R.n||"").toUpperCase(),940).forEach(l=>{c.fillText(l,66,y);y+=116;});
  c.fillStyle="rgba(255,255,255,.82)";c.font=BODY("500 34px");y+=6;
  wlines(c,R.tg||"",940).forEach(l=>{c.fillText(l,70,y);y+=44;});
  c.fillStyle=RED;c.font=BODY("600 28px");c.fillText("@theoddvi",70,y+18);
}
function profile(cv,img,R){
  cv.width=1080;cv.height=1080;const c=cv.getContext("2d");
  c.fillStyle=INK;c.fillRect(0,0,1080,1080);drawCover(c,img,0,0,1080,1080);

function card(cv,img,R,key){
