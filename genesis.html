<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oddvi'nin Doğuşu — Oddvi</title>
<meta name="description" content="Oddvi nasıl doğdu? Kaydırarak izle." />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#141414;--font-disp:"Bricolage Grotesque",system-ui,sans-serif;--font-body:"Inter",system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#cfcfcf;font-family:var(--font-body);transition:background-color 1s ease}

  .intro{height:70vh;height:70dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink);padding:24px}
  .intro h1{font-family:var(--font-disp);font-weight:800;font-size:clamp(28px,6vw,50px)}
  .intro p{opacity:.6;margin-top:14px;font-size:15px}
  .intro .arrow{margin-top:40px;font-size:22px;animation:bounce 1.8s ease-in-out infinite;opacity:.5}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}

  .track{position:relative;height:1000vh}
  @media(max-width:600px){.track{height:700vh}}
  .stage-viewport{position:sticky;top:0;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  .nature-bg{position:absolute;inset:0;z-index:0;opacity:0;transition:opacity 1.4s ease}
  .nature-bg.show{opacity:1}
  .nature-bg svg{width:100%;height:100%}
  .stage-viewport svg.char{width:min(52vw,290px);height:auto;overflow:visible;position:relative;z-index:1}
  .caption{position:relative;z-index:1;margin-top:26px;color:var(--ink);font-family:var(--font-disp);font-weight:800;font-size:clamp(20px,4vw,30px);text-align:center;opacity:0;transform:translateY(14px);transition:opacity .5s ease,transform .5s ease;max-width:20ch;padding:0 24px}
  .caption.show{opacity:1;transform:translateY(0)}

  .progress{position:fixed;left:0;top:0;height:3px;background:var(--ink);z-index:5;width:0%;opacity:.5}

  .part{opacity:0;transform:scale(.6);transform-origin:center;transition:opacity .5s ease,transform .5s cubic-bezier(.3,1.4,.4,1)}
  .part.on{opacity:1;transform:scale(1)}

  .sound-btn{position:fixed;right:18px;bottom:18px;z-index:6;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:12px 18px;font-family:var(--font-disp);font-weight:800;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.25)}
  .home-link{position:fixed;left:18px;top:18px;z-index:6;background:rgba(255,255,255,.85);color:var(--ink);text-decoration:none;font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;box-shadow:2px 2px 0 rgba(0,0,0,.15)}

  .outro{height:60vh;height:60dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink)}
  .outro h2{font-family:var(--font-disp);font-weight:800;font-size:clamp(24px,5vw,40px)}
</style>
</head>
<body id="bod">

<a href="/index.html" class="home-link">← Ana sayfaya dön</a>

<div class="outro">
  <h2>Rengarenk bir dünyaya hoş geldin, Oddvi.</h2>
</div>

<script>
  var STAGES = [
    {parts:["p-body"], text:"Başlangıçta sadece bir şekil vardı.", bg:"#cfcfcf"},
    {parts:["p-eye1"], text:"Sonra, bir göz açıldı.", bg:"#cdeae5"},
    {parts:["p-pupil1"], text:"Ve bir bakış oluştu.", bg:"#f7e3c0"},
    {parts:["p-eye2","p-pupil2"], text:"İkinci göz de katıldı.", bg:"#f9d0d8"},
    {parts:["p-brow1","p-brow2"], text:"Bir ifade belirdi.", bg:"#dcd0f2"},
    {parts:["p-mouth"], text:"Bir ağız, konuşmaya hazır.", bg:"#c9f0d9"},
    {parts:["p-arm1"], text:"Bir başparmak havaya kalktı.", bg:"#ffd166"},
    {parts:["p-arm2"], text:"İki elle, tam onaylı.", bg:"#ff8fa3"},
    {parts:["p-legs"], text:"Bacaklar, ayakkabılar, hazır.", bg:"#6ee7d8"},
    {parts:["p-shorts"], text:"Ve işte... Oddvi doğdu.", bg:"#fff8f0"}
  ];

  var track = document.getElementById('track');
  var caption = document.getElementById('caption');
  var progressBar = document.getElementById('progress');
  var bod = document.getElementById('bod');
  var shownParts = new Set();
  var currentStage = -1;

  function update(){
    var rect = track.getBoundingClientRect();
    var total = rect.height - window.innerHeight;
    var scrolled = Math.min(Math.max(-rect.top, 0), total);
    var pct = total > 0 ? scrolled / total : 0;
    progressBar.style.width = (pct*100) + '%';

    var stageIdx = Math.min(STAGES.length - 1, Math.floor(pct * STAGES.length));
    if (stageIdx !== currentStage && stageIdx >= 0) {
      currentStage = stageIdx;
      caption.textContent = STAGES[stageIdx].text;
      caption.classList.add('show');
      bod.style.backgroundColor = STAGES[stageIdx].bg;
      if (stageIdx === STAGES.length - 1) {
        document.getElementById('natureBg').classList.add('show');
      }
      STAGES[stageIdx].parts.forEach(function(id){
        if (!shownParts.has(id)) {
          shownParts.add(id);
          document.getElementById(id).classList.add('on');
        }
      });
      playChime(stageIdx);
    }
  }
  window.addEventListener('scroll', update, {passive:true});
  update();

  var ctx = null, soundOn = false;
  var soundBtn = document.getElementById('soundBtn');
  var SCALE = [261.63,293.66,329.63,349.23,392.00,440.00,523.25,587.33,659.25,783.99];

  function initAudio(){
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playNote(freq, t0, dur, gainPeak, type){
    var osc = ctx.createOscillator();
    var g = ctx.createGain();
    osc.type = type || "triangle";
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gainPeak, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }

  function playChime(stageIdx){
    if (!soundOn || !ctx) return;
    var now = ctx.currentTime;
    var freq = SCALE[stageIdx % SCALE.length];
    playNote(freq, now, 0.5, 0.18, "triangle");
    playNote(freq*2, now, 0.3, 0.06, "sine");

    if (stageIdx === STAGES.length - 1) {
      var chord = [freq, freq*1.26, freq*1.5, freq*2];
      chord.forEach(function(f, i){
        playNote(f, now + 0.05, 1.4, 0.14, "triangle");
      });
      [freq*2, freq*2.5, freq*3, freq*4].forEach(function(f, i){
        playNote(f, now + 0.12 + i*0.06, 0.5, 0.05, "sine");
      });
    }
  }

  soundBtn.addEventListener('click', function(){
    initAudio();
    if (ctx.state === 'suspended') ctx.resume();
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? 'Sesi kapat ×' : 'Sesi aç ♪';
    if (soundOn) playChime(currentStage);
  });
</script>
