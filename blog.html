<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oddverse Journal — Oddvi</title>
<meta name="description" content="Field notes from a slightly crooked world. The Oddvi journal." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --ink:#141414;
    --paper:#fbf6f3;
    --paper-2:#f2e9e3;
    --card:#ffffff;
    --red:#ff3366;
    --red-deep:#e21b54;
    --yellow:#f5b400;
    --line: color-mix(in srgb, var(--ink) 12%, transparent);
    --font-disp:"Bricolage Grotesque", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}

  header{position:sticky;top:0;z-index:50;background:color-mix(in srgb, var(--paper) 84%, transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:70px}
  .logo{font-family:var(--font-disp);font-weight:800;font-size:22px;text-decoration:none;letter-spacing:-.02em}
  .nav-links{display:flex;align-items:center;gap:22px;font-weight:500;font-size:15px}
  .nav-links a{text-decoration:none;opacity:.7;transition:opacity .2s}
  .nav-links a:hover{opacity:1}
  .nav-cta{background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-weight:600;font-size:14px;transition:transform .2s;text-decoration:none}
  .nav-cta:hover{transform:translateY(-2px)}
  @media(max-width:760px){.nav-links a.txt{display:none}}
  @media(max-width:560px){.nav-cta{display:none}}

  .lang-switch{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lang-btn{font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.04em;line-height:1;border:none;cursor:pointer;border-radius:999px;padding:7px 11px;color:#fff;opacity:.45;transition:opacity .15s,transform .15s,box-shadow .15s}
  .lang-btn:hover{opacity:.85;transform:translateY(-1px)}
  .lang-btn:focus-visible{outline:none;opacity:1}
  .lang-btn[aria-pressed="true"]{opacity:1;transform:translateY(-1px);box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink)}
  .lang-btn[data-lang="en"]{background:#ff3366}
  .lang-btn[data-lang="tr"]{background:#1ec8c8}
  .lang-btn[data-lang="de"]{background:#f5b400;color:#141414}
  .lang-btn[data-lang="fr"]{background:#845ec2}
  .lang-btn[data-lang="hu"]{background:#ff7a45}

  .hero{padding:70px 0 34px}
  .kicker{font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--red-deep)}
  .jtitle{font-family:var(--font-disp);font-weight:800;font-size:clamp(38px,7vw,68px);line-height:1.02;letter-spacing:-.02em;margin:10px 0 12px}
  .jtitle .pop{color:var(--red)}
  .jsub{font-size:clamp(16px,2.2vw,20px);opacity:.72;max-width:560px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:26px;padding:20px 0 90px}
  .post-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
  .post-card:hover{transform:translateY(-4px);box-shadow:0 26px 50px -30px rgba(20,20,20,.5)}
  .post-card .cov{aspect-ratio:16/10;background:var(--paper-2);overflow:hidden}
  .post-card .cov img{width:100%;height:100%;object-fit:cover;display:block}
  .post-card .body{padding:20px 22px 24px}
  .post-card .date{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--red-deep)}
  .post-card h3{font-family:var(--font-disp);font-weight:700;font-size:22px;line-height:1.15;margin:8px 0 8px;letter-spacing:-.01em}
  .post-card p{font-size:15px;opacity:.72}
  .post-card .read{margin-top:14px;font-weight:600;font-size:14px;color:var(--red)}

  .empty{padding:40px 0 120px;font-size:18px;opacity:.65}

  /* single post */
  .article{max-width:720px;margin:0 auto;padding:36px 0 100px}
  .backlink{display:inline-block;font-weight:600;font-size:14px;color:var(--red);text-decoration:none;margin-bottom:26px}
  .article .cov{border-radius:var(--radius);overflow:hidden;background:var(--paper-2);margin-bottom:26px}
  .article .cov img{width:100%;display:block}
  .article .date{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--red-deep)}
  .article h1{font-family:var(--font-disp);font-weight:800;font-size:clamp(30px,5vw,46px);line-height:1.05;letter-spacing:-.02em;margin:10px 0 26px}
  .prose{font-size:17px;line-height:1.72}
  .prose h1,.prose h2,.prose h3{font-family:var(--font-disp);letter-spacing:-.01em;margin:30px 0 12px;line-height:1.2}
  .prose h1{font-size:30px}.prose h2{font-size:25px}.prose h3{font-size:20px}
  .prose p{margin:0 0 18px}
  .prose a{color:var(--red-deep);text-decoration:underline}
  .prose ul,.prose ol{margin:0 0 18px 22px}
  .prose li{margin:6px 0}
  .prose img{max-width:100%;border-radius:14px;margin:18px 0}
  .prose blockquote{border-left:4px solid var(--red);padding:2px 0 2px 18px;margin:22px 0;font-family:var(--font-disp);font-size:22px;opacity:.9}
  .prose strong{font-weight:600}

  footer{border-top:1px solid var(--line);padding:40px 0;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:14px;opacity:.75}
</style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">ODDVI</a>
      <nav class="nav-links">
        <a href="index.html#meet" class="txt">Meet Oddvi</a>
        <a href="index.html#story" class="txt">The Story</a>
        <a href="blog.html" class="txt">Journal</a>
        <div id="langSwitch" class="lang-switch" role="group" aria-label="Language"></div>
        <a href="odd-test.html" class="nav-cta">What's your Odd?</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- LIST VIEW -->
    <section id="listView">
      <div class="hero">
        <span class="kicker" id="jkicker">Oddverse</span>
        <h1 class="jtitle" id="jtitle">Oddverse <span class="pop">Journal</span></h1>
        <p class="jsub" id="jsub">Field notes from a slightly crooked world.</p>
      </div>
      <div class="grid" id="grid"></div>
      <p class="empty" id="empty" hidden></p>
    </section>

    <!-- ARTICLE VIEW -->
    <article class="article" id="articleView" hidden>
      <a href="#" class="backlink" id="backlink">← Back to Journal</a>
      <div class="cov" id="artCov" hidden></div>
      <div class="date" id="artDate"></div>
      <h1 id="artTitle"></h1>
      <div class="prose" id="artBody"></div>
    </article>
  </main>

  <footer class="wrap">
    <span>© Pardon My Odd</span>
    <span>Follow the blob: <a href="https://instagram.com/theoddvi" style="color:var(--red-deep)">@theoddvi</a></span>
  </footer>

  <script src="i18n.js"></script>
  <script>
  (function(){
    // Blog chrome strings per language (page-specific; brand slogans stay English)
    var T = {
      en:{kicker:"Oddverse",title:'Oddverse <span class="pop">Journal</span>',sub:"Field notes from a slightly crooked world.",back:"\u2190 Back to Journal",empty:"No entries yet. Come back soon.",read:"Read \u2192"},
      tr:{kicker:"Oddverse",title:'Oddverse <span class="pop">G\u00fcnl\u00fc\u011f\u00fc</span>',sub:"Biraz e\u011fri bir d\u00fcnyadan notlar.",back:"\u2190 G\u00fcnl\u00fc\u011fe d\u00f6n",empty:"Hen\u00fcz yaz\u0131 yok. Yak\u0131nda burada.",read:"Oku \u2192"},
      de:{kicker:"Oddverse",title:'Oddverse <span class="pop">Journal</span>',sub:"Notizen aus einer leicht schiefen Welt.",back:"\u2190 Zur\u00fcck zum Journal",empty:"Noch keine Eintr\u00e4ge. Bald mehr.",read:"Lesen \u2192"},
      fr:{kicker:"Oddverse",title:'Journal <span class="pop">Oddverse</span>',sub:"Notes d'un monde un peu de travers.",back:"\u2190 Retour au journal",empty:"Pas encore d'articles. \u00c0 bient\u00f4t.",read:"Lire \u2192"},
      hu:{kicker:"Oddverse",title:'Oddverse <span class="pop">Napl\u00f3</span>',sub:"Jegyzetek egy kiss\u00e9 g\u00f6rbe vil\u00e1gb\u00f3l.",back:"\u2190 Vissza a napl\u00f3hoz",empty:"M\u00e9g nincs bejegyz\u00e9s. Hamarosan.",read:"Olvasd \u2192"}
    };
    var LANGS = ["en","tr","de","fr","hu"];
    var posts = [];

    function lang(){
      var l = document.documentElement.lang || localStorage.getItem("oddvi_lang") || "en";
      return T[l] ? l : "en";
    }
    function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
    function fmtDate(d,l){
      try{ return new Date(d).toLocaleDateString(l,{year:"numeric",month:"short",day:"numeric"}); }
      catch(e){ return d||""; }
    }
    function slugOf(p,i){ return (p.slug && String(p.slug).trim()) ? String(p.slug).trim() : ("post-"+i); }

    // posts relevant to current language: matching lang, else (if none) show all
    function visiblePosts(l){
      var m = posts.filter(function(p){ return (p.lang||"").toLowerCase() === l; });
      return m.length ? m : posts.slice();
    }

    function renderList(){
      var l = lang(), t = T[l];
      document.getElementById("jkicker").textContent = t.kicker;
      document.getElementById("jtitle").innerHTML = t.title;
      document.getElementById("jsub").textContent = t.sub;
      document.getElementById("backlink").textContent = t.back;

      var vis = visiblePosts(l).slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
      var grid = document.getElementById("grid"), empty = document.getElementById("empty");
      if(!vis.length){
        grid.innerHTML = ""; empty.textContent = t.empty; empty.hidden = false; return;
      }
      empty.hidden = true;
      grid.innerHTML = vis.map(function(p){
        var i = posts.indexOf(p), s = slugOf(p,i);
        var cov = p.cover ? '<div class="cov"><img src="'+esc(p.cover)+'" alt="'+esc(p.title)+'" loading="lazy"></div>' : "";
        return '<a class="post-card" href="#'+encodeURIComponent(s)+'">'+cov+
          '<div class="body"><div class="date">'+esc(fmtDate(p.date,l))+'</div>'+
          '<h3>'+esc(p.title)+'</h3>'+
          (p.excerpt?'<p>'+esc(p.excerpt)+'</p>':"")+
          '<div class="read">'+t.read+'</div></div></a>';
      }).join("");
    }

    function renderArticle(p){
      var l = lang(), t = T[l];
      document.getElementById("backlink").textContent = t.back;
      var cov = document.getElementById("artCov");
      if(p.cover){ cov.innerHTML = '<img src="'+esc(p.cover)+'" alt="'+esc(p.title)+'">'; cov.hidden = false; }
      else { cov.hidden = true; }
      document.getElementById("artDate").textContent = fmtDate(p.date,l);
      document.getElementById("artTitle").textContent = p.title || "";
      var body = p.body || "";
      var html = (window.marked ? marked.parse(body) : esc(body).replace(/\n/g,"<br>"));
      document.getElementById("artBody").innerHTML = html;
    }

    function route(){
      var hash = decodeURIComponent((location.hash||"").replace(/^#/,"")).trim();
      var listView = document.getElementById("listView");
      var articleView = document.getElementById("articleView");
      var found = null;
      if(hash){
        for(var i=0;i<posts.length;i++){ if(slugOf(posts[i],i)===hash){ found = posts[i]; break; } }
      }
      if(found){
        listView.hidden = true; articleView.hidden = false;
        renderArticle(found); window.scrollTo(0,0);
      } else {
        articleView.hidden = true; listView.hidden = false;
        renderList();
      }
    }

    function load(){
      fetch("/blog.json?t="+Date.now())
        .then(function(r){ return r.ok ? r.json() : {posts:[]}; })
        .then(function(data){ posts = (data && data.posts) ? data.posts : []; route(); })
        .catch(function(){ posts = []; route(); });
    }

    window.addEventListener("hashchange", route);
    window.addEventListener("oddvi:lang", function(){ route(); });
    document.getElementById("backlink").addEventListener("click", function(e){
      e.preventDefault(); location.hash = "";
    });

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", load);
    } else { load(); }
  })();
  </script>
</body>
</html>
