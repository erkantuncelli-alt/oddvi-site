<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Odd Gallery — Oddvi</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="description" content="The full Odd Gallery — every Oddvi sticker and scene in one place." />

<meta property="og:type" content="website" />
<meta property="og:title" content="Odd Gallery — Oddvi" />
<meta property="og:description" content="The full Odd Gallery — every Oddvi sticker and scene in one place." />
<meta property="og:image" content="https://theoddvi.com/uploads/og-share.png" />
<meta property="og:url" content="https://theoddvi.com/odd-gallery.html" />
<meta property="og:site_name" content="Oddvi" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Odd Gallery — Oddvi" />
<meta name="twitter:description" content="The full Odd Gallery — every Oddvi sticker and scene in one place." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#141414;
    --paper:#fff8f0;
    --paper-2:#f7eddd;
    --card:#ffffff;
    --red:#ff3366;
    --red-deep:#e21b54;
    --teal:#1ec8c8;
    --yellow:#ffc93c;
    --mint:#e7fbf0;
    --radius:20px;
    --font-disp:"Bricolage Grotesque", system-ui, sans-serif;
    --font-body:"Inter", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-body);color:var(--ink);background:var(--mint);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:1200px;margin-inline:auto;padding-inline:24px}
  img{display:block;max-width:100%}
  a{color:inherit}

  header{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:3px solid var(--ink)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:72px}
  .logo{font-family:var(--font-disp);font-weight:800;font-size:23px;letter-spacing:-.01em;text-decoration:none;display:inline-block;transform:rotate(-3deg)}
  .back{font-weight:700;font-size:14px;text-decoration:none;opacity:.75;display:inline-flex;align-items:center;gap:6px}
  .back:hover{opacity:1}
  .lang-switch{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap}
  .lang-btn{font-family:var(--font-body);font-weight:700;font-size:12px;letter-spacing:.04em;line-height:1;border:2px solid var(--ink);cursor:pointer;border-radius:999px;padding:6px 10px;color:#fff;opacity:.5;transition:opacity .15s,transform .15s,box-shadow .15s}
  .lang-btn:hover{opacity:.9;transform:translateY(-1px)}
  .lang-btn:focus-visible{outline:none;opacity:1}
  .lang-btn[aria-pressed="true"]{opacity:1;transform:translateY(-1px) rotate(-2deg);box-shadow:3px 3px 0 var(--ink)}
  .lang-btn[data-lang="en"]{background:#ff3366}
  .lang-btn[data-lang="tr"]{background:#1ec8c8}
  .lang-btn[data-lang="de"]{background:#f5b400;color:#141414}
  .lang-btn[data-lang="fr"]{background:#845ec2}
  .lang-btn[data-lang="hu"]{background:#ff7a45}

  .ghead{padding:56px 0 30px;text-align:center}
  .kicker{display:inline-block;font-family:var(--font-disp);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:5px 12px;border-radius:8px;transform:rotate(-2deg)}
  .h2{font-family:var(--font-disp);font-weight:800;font-size:clamp(34px,6vw,62px);line-height:1;letter-spacing:-.03em;margin-top:18px}
  .ghead p{opacity:.78;max-width:52ch;margin:16px auto 0;font-weight:500}

  /* FILTERS */
  .filters{padding-bottom:8px}
  .filter-group{margin-bottom:16px}
  .filter-label{display:block;font-family:var(--font-disp);font-weight:800;font-size:12px;letter-spacing:.05em;text-transform:uppercase;opacity:.6;margin-bottom:8px}
  .filter-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-family:var(--font-body);font-weight:700;font-size:13px;padding:8px 15px;border-radius:999px;border:2.5px solid var(--ink);background:var(--card);color:var(--ink);cursor:pointer;box-shadow:2.5px 2.5px 0 var(--ink);transition:transform .12s,box-shadow .12s,background .15s,color .15s;white-space:nowrap}
  .chip:hover{transform:translate(1px,1px);box-shadow:1.5px 1.5px 0 var(--ink)}
  .chip.active{background:var(--ink);color:#fff}
  .filter-count{text-align:center;font-size:13px;font-weight:700;opacity:.55;margin:8px 0 22px}
  .card.hide{display:none}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding-bottom:70px}
  @media(max-width:980px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr);gap:14px}}
  .card{position:relative;border-radius:14px;overflow:hidden;background:var(--card);aspect-ratio:4/5;border:3px solid var(--ink);box-shadow:5px 5px 0 var(--ink);transition:transform .2s ease,box-shadow .2s ease;cursor:pointer}
  .card-share{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:9px;border:2px solid var(--ink);background:var(--paper);color:var(--ink);display:grid;place-items:center;cursor:pointer;font-size:16px;box-shadow:2px 2px 0 var(--ink);opacity:.92;z-index:3;transition:transform .12s,box-shadow .12s}
  .like-btn{position:absolute;left:8px;top:8px;display:inline-flex;align-items:center;gap:4px;border:2px solid var(--ink);background:rgba(255,248,240,.95);border-radius:999px;padding:4px 9px;font-weight:700;font-size:12px;cursor:pointer;transition:transform .12s;z-index:3}
  .like-btn:hover:not(:disabled){transform:scale(1.08)}
  .like-btn:disabled{cursor:default;opacity:.75}
  .like-btn.liked{background:#ffe3ea;border-color:var(--red)}
  .card-share:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}

  #oddStreakWrap{position:fixed;right:18px;bottom:18px;z-index:60}
  #oddStreakBtn{display:flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:3px solid var(--ink);border-radius:999px;padding:10px 15px;font-family:var(--font-disp);font-weight:800;font-size:15px;cursor:pointer;box-shadow:4px 4px 0 var(--red);transition:transform .12s,box-shadow .12s}
  #oddStreakBtn:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--red)}
  .os-emoji{font-size:18px}
  #oddStreakPop{position:fixed;right:18px;bottom:80px;width:250px;background:var(--card);border:3px solid var(--ink);border-radius:16px;box-shadow:6px 6px 0 var(--ink);padding:22px 18px 18px;text-align:center;display:none;z-index:61}
  #oddStreakPop.open{display:block}
  #oddStreakClose{position:absolute;top:6px;right:10px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink)}
  .os-emoji-big{font-size:36px}
  .os-title{font-family:var(--font-disp);font-weight:800;font-size:16px;margin-top:6px}
  .os-sub{font-size:13px;opacity:.75;margin-top:6px}
  .os-share{margin-top:14px;background:var(--red);color:#fff;border:2.5px solid var(--ink);border-radius:10px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 var(--ink)}
  @media(max-width:680px){#oddStreakWrap{right:12px;bottom:12px}#oddStreakPop{right:12px;width:210px}}

  .lb-share{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;border:2.5px solid #fff;border-radius:999px;padding:11px 20px;font-family:var(--font-disp);font-weight:800;font-size:14px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.5)}
  .card:nth-child(3n+1){transform:rotate(-1.6deg)}
  .card:nth-child(3n+2){transform:rotate(1.4deg)}
  .card:nth-child(3n){transform:rotate(-.6deg)}
  .card img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
  .card:hover{transform:rotate(0) translateY(-5px);box-shadow:8px 8px 0 var(--ink);z-index:2}
  .card:hover img{transform:scale(1.05)}
  .card figcaption{position:absolute;left:0;right:0;bottom:0;padding:30px 14px 12px;color:#fff;font-weight:700;font-size:14px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s}
  .card:hover figcaption{opacity:1;transform:none}
  @media(hover:none){.card figcaption{opacity:1;transform:none}}

  /* Lightbox */
  .lb{position:fixed;inset:0;background:rgba(20,20,20,.92);display:none;align-items:center;justify-content:center;z-index:100;padding:24px}
  .lb.open{display:flex}
  .lb img{max-width:min(92vw,720px);max-height:82vh;border-radius:14px;border:4px solid #fff}
  .lb-cap{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:#fff;font-family:var(--font-disp);font-weight:800;font-size:20px}
  .lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:32px;background:none;border:none;cursor:pointer;line-height:1}

  footer{padding:40px 0;background:var(--ink);color:var(--paper);text-align:center;font-size:14px}
  footer a{font-weight:700;text-decoration:none;color:var(--red-deep)}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="logo">ODDVI</a>
    <div style="display:flex;align-items:center;gap:18px">
      <a href="index.html" class="back" data-i18n="og.back">← Back home</a>
      <div id="langSwitch" class="lang-switch" role="group" aria-label="Language"></div>
    </div>
  </div>
</header>

<div class="ghead wrap">
  <span class="kicker" data-i18n="og.kicker">The full set</span>
  <h1 class="h2" data-i18n="og.h1">The Odd Gallery.</h1>
  <p data-i18n="og.intro">Every sticker, every scene, every little bit of odd — all in one place. Tap any card to see it bigger.</p>
</div>

<div class="wrap filters">
  <div class="filter-group" data-group="mood">
    <span class="filter-label" data-i18n="og.filter.mood">Your mood</span>
    <div class="filter-chips">
      <button class="chip active" data-value="all" data-i18n="og.chip.all">All</button>
      <button class="chip" data-value="chaotic" data-i18n="og.tag.chaotic">Chaotic</button>
      <button class="chip" data-value="chill" data-i18n="og.tag.chill">Chill</button>
      <button class="chip" data-value="dramatic" data-i18n="og.tag.dramatic">Dramatic</button>
      <button class="chip" data-value="petty" data-i18n="og.tag.petty">Petty</button>
      <button class="chip" data-value="sarcastic" data-i18n="og.tag.sarcastic">Sarcastic</button>
      <button class="chip" data-value="wholesome" data-i18n="og.tag.wholesome">Wholesome</button>
      <button class="chip" data-value="confident" data-i18n="og.tag.confident">Confident</button>
    </div>
  </div>
  <div class="filter-group" data-group="occasion">
    <span class="filter-label" data-i18n="og.filter.occasion">The joke</span>
    <div class="filter-chips">
      <button class="chip active" data-value="all" data-i18n="og.chip.all">All</button>
      <button class="chip" data-value="roast-a-friend" data-i18n="og.tag.roast-a-friend">Roast a friend</button>
      <button class="chip" data-value="group-chat" data-i18n="og.tag.group-chat">Group chat</button>
      <button class="chip" data-value="work-meeting" data-i18n="og.tag.work-meeting">Work meeting</button>
      <button class="chip" data-value="self-deprecating" data-i18n="og.tag.self-deprecating">Self-deprecating</button>
      <button class="chip" data-value="motivational" data-i18n="og.tag.motivational">Motivational</button>
      <button class="chip" data-value="throwback" data-i18n="og.tag.throwback">Throwback</button>
    </div>
  </div>
  <div class="filter-group" data-group="domain">
    <span class="filter-label" data-i18n="og.filter.domain">Who it's for</span>
    <div class="filter-chips">
      <button class="chip active" data-value="all" data-i18n="og.chip.all">All</button>
      <button class="chip" data-value="fashion" data-i18n="og.tag.fashion">Fashion</button>
      <button class="chip" data-value="food" data-i18n="og.tag.food">Food</button>
      <button class="chip" data-value="fitness" data-i18n="og.tag.fitness">Fitness</button>
      <button class="chip" data-value="home" data-i18n="og.tag.home">Home</button>
      <button class="chip" data-value="work-office" data-i18n="og.tag.work-office">Work &amp; Office</button>
      <button class="chip" data-value="social-life" data-i18n="og.tag.social-life">Social Life</button>
      <button class="chip" data-value="travel" data-i18n="og.tag.travel">Travel</button>
      <button class="chip" data-value="art-creativity" data-i18n="og.tag.art-creativity">Art &amp; Creativity</button>
      <button class="chip" data-value="nature" data-i18n="og.tag.nature">Nature</button>
      <button class="chip" data-value="tech" data-i18n="og.tag.tech">Tech</button>
      <button class="chip" data-value="mystery-brand" data-i18n="og.tag.mystery-brand">Mystery</button>
    </div>
  </div>
  <p class="filter-count" id="filterCount"></p>
</div>

<div class="wrap">
  <div class="grid" id="fullGrid"></div>
</div>

<div class="lb" id="lb">
  <button class="lb-close" id="lbClose">&times;</button>
  <img id="lbImg" src="" alt="" />
  <button class="lb-share" id="lbShare" data-i18n="og.share">&#8599; Share</button>
  <div class="lb-cap" id="lbCap"></div>
</div>

<footer>
  <div class="wrap">
    <a href="https://instagram.com/theoddvi" target="_blank" rel="noopener">@theoddvi</a> — Stay Odd. <span style="opacity:.55;font-size:13px">· 🏗️ <a href="https://instagram.com/pardonmyodd" target="_blank" rel="noopener" style="color:inherit" title="Our upcoming brand — coming soon">@pardonmyodd</a></span>
  </div>
</footer>

<script src="i18n.js"></script>
<script src="streak.js"></script>
<script src="share.js"></script>
<script src="likes-widget.js"></script>
<script>
  (function(){
    function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
    function slugOf(imgPath){ var m = imgPath.match(/([^\/]+)\.[a-zA-Z0-9]+$/); return m ? m[1] : ''; }
    var grid = document.getElementById('fullGrid');
    var lb = document.getElementById('lb'), lbImg = document.getElementById('lbImg'), lbCap = document.getElementById('lbCap'), lbClose = document.getElementById('lbClose'), lbShare = document.getElementById('lbShare');
    var currentItem = null;
    var allItems = [];
    var active = { mood: 'all', occasion: 'all', domain: 'all' };

    function curLang(){ return document.documentElement.lang || localStorage.getItem('oddvi_lang') || 'en'; }

    function openLightbox(it){
      currentItem = it;
      var cap = it[curLang()] || it.en || '';
      lbImg.src = encodeURI(it.image);
      lbImg.alt = cap;
      lbCap.textContent = cap;
      lb.classList.add('open');
      var slug = slugOf(it.image);
      var url = new URL(location.href);
      url.searchParams.set('img', slug);
      history.replaceState(null, '', url.toString());
    }

    function closeLightbox(){
      lb.classList.remove('open');
      var url = new URL(location.href);
      url.searchParams.delete('img');
      history.replaceState(null, '', url.toString());
    }

    fetch('/gallery.json?t='+Date.now())
      .then(function(r){return r.ok?r.json():{items:[]};})
      .then(function(d){
        var items = (d && d.items) ? d.items : [];
        allItems = items;
        grid.innerHTML = items.map(function(it,i){
          var l = curLang();
          var cap = it[l] || it.en || '';
          var slug = slugOf(it.image);
          var t = it.tags || {};
          var moods = (t.mood||[]).join(' ');
          var occasions = (t.occasion||[]).join(' ');
          var domains = (t.domain||[]).join(' ');
          var dShare = ((window.I18N && window.I18N.dict[l]) || {})['og.share'] || 'Share';
          var likeId = window.OddLikes ? window.OddLikes.pathId(it.image) : '';
          return '<figure class="card" data-idx="'+i+'" data-slug="'+esc(slug)+'" data-mood="'+esc(moods)+'" data-occasion="'+esc(occasions)+'" data-domain="'+esc(domains)+'">'+
            '<img src="'+esc(encodeURI(it.image))+'" alt="'+esc(cap)+'" loading="lazy">'+
            '<button class="card-share" aria-label="Share" title="'+esc(dShare)+'">&#8599;</button>'+
            (window.OddLikes ? window.OddLikes.buttonHTML(likeId) : '')+
            '<figcaption>'+esc(cap)+'</figcaption></figure>';
        }).join('');

        if(window.OddLikes) window.OddLikes.wire(grid);
        grid.querySelectorAll('.card').forEach(function(card){
          card.addEventListener('click', function(){
            openLightbox(items[+card.getAttribute('data-idx')]);
          });
        });
        grid.querySelectorAll('.card-share').forEach(function(btn){
          btn.addEventListener('click', function(e){
            e.preventDefault(); e.stopPropagation();
            var card = btn.closest('.card');
            var it = items[+card.getAttribute('data-idx')];
            var deepUrl = location.origin + '/odd-gallery.html?img=' + encodeURIComponent(card.getAttribute('data-slug'));
            if (window.OddShare) window.OddShare.shareImage(it.image, it[curLang()] || it.en, deepUrl);
          });
        });

        applyFilters();

        /* Deep link: ?img=slug otomatik açar */
        var wanted = new URLSearchParams(location.search).get('img');
        if (wanted) {
          var match = items.find(function(it){ return slugOf(it.image) === wanted; });
          if (match) openLightbox(match);
        }
      })
      .catch(function(){ grid.innerHTML = '<p>Could not load the gallery right now.</p>'; });

    function applyFilters(){
      var cards = grid.querySelectorAll('.card');
      var visible = 0;
      cards.forEach(function(card){
        var ok = true;
        ['mood','occasion','domain'].forEach(function(g){
          if (active[g] !== 'all') {
            var vals = (card.getAttribute('data-'+g) || '').split(' ');
            if (vals.indexOf(active[g]) === -1) ok = false;
          }
        });
        card.classList.toggle('hide', !ok);
        if (ok) visible++;
      });
      var countEl = document.getElementById('filterCount');
      if (countEl) {
        var l = document.documentElement.lang || localStorage.getItem('oddvi_lang') || 'en';
        var d = (window.I18N && window.I18N.dict[l]) || {};
        var tpl = (visible === 1 ? d['og.count.one'] : d['og.count.other']) || (visible + (visible === 1 ? ' odd found' : ' odds found'));
        countEl.textContent = tpl.replace('{n}', visible);
      }
    }

    document.querySelectorAll('.filter-group').forEach(function(group){
      var g = group.getAttribute('data-group');
      group.querySelectorAll('.chip').forEach(function(chip){
        chip.addEventListener('click', function(){
          group.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
          chip.classList.add('active');
          active[g] = chip.getAttribute('data-value');
          applyFilters();
        });
      });
    });

    window.addEventListener('oddvi:lang', applyFilters);
    window.addEventListener('oddvi:lang', function(){
      var l = document.documentElement.lang || localStorage.getItem('oddvi_lang') || 'en';
      var dShare = ((window.I18N && window.I18N.dict[l]) || {})['og.share'] || 'Share';
      grid.querySelectorAll('.card-share').forEach(function(btn){ btn.title = dShare; });
    });

    lbClose.addEventListener('click', closeLightbox);
    lb.addEventListener('click', function(e){ if(e.target===lb) closeLightbox(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });
    lbShare.addEventListener('click', function(){
      if (!currentItem || !window.OddShare) return;
      var slug = slugOf(currentItem.image);
      var deepUrl = location.origin + '/odd-gallery.html?img=' + encodeURIComponent(slug);
      window.OddShare.shareImage(currentItem.image, currentItem.en, deepUrl);
    });
  })();
</script>

</body>
</html>
